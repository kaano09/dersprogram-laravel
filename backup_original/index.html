<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - AhiEvran Program Oluşturucu</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="glass-panel login-box">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="img/logo.jpg" alt="Logo" style="width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-color); margin-bottom: 1rem;">
                <h2>Yetkili Giriş</h2>
                <p style="color: #64748b; font-size: 0.9rem;">Ders programı yönetimi için yetkili girişi zorunludur.</p>
            </div>
            
            <form onsubmit="handleLogin(event); return false;">
                <div class="form-group">
                    <label for="username"><i class="fa-solid fa-user"></i> Kullanıcı Adı</label>
                    <input type="text" id="username" placeholder="Yetkili kullanıcı adınızı girin" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-lock"></i> Şifre</label>
                    <input type="password" id="password" placeholder="Şifrenizi girin" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    <i class="fa-solid fa-right-to-bracket"></i> Giriş Yap
                </button>
            </form>
        </div>
    </div>

    <!-- Sadece yetkili girişini kontrol edecek script -->
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { 
            applySavedTheme(); 
        });
    </script>
</body>
</html>

name: FTP Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, fileinfo, mysql, pdo_mysql

      - name: Install Dependencies
        run: |
          composer update -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --no-dev --optimize-autoloader
          php artisan package:discover --ansi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Assets
        run: |
          npm install
          npm run build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          timeout: 300000
          protocol: ftp
          security: loose
          exclude: |
            **/.env
            **/.env.example
            **/.git*
            **/.git*/**
            **/.github/**
            **/.gitignore
            **/.gitkeep
            **/README.md
            **/tests/**
            **/node_modules/**
            **/phpunit.xml
            **/package.json
            **/package-lock.json
            **/vite.config.js
            **/tailwind.config.js
            **/postcss.config.js
            **/deployment_guide.md
            **/migration_log.txt
          log-level: standard
          dry-run: false
          dangerous-clean-slate: false

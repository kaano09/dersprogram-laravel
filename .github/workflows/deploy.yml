name: FTP Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, fileinfo, mysql, pdo_mysql

      - name: Install Dependencies
        run: |
          composer update -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --no-dev --optimize-autoloader
          php artisan package:discover --ansi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Assets
        run: |
          npm install
          npm run build

      - name: Prepare deployment structure for shared hosting
        run: |
          mkdir -p deploy/public_html
          mkdir -p deploy/laravel_app

          rsync -a --exclude='public' --exclude='node_modules' --exclude='tests' \
            --exclude='.git' --exclude='.github' --exclude='deploy' \
            --exclude='.env' --exclude='phpunit.xml' \
            --exclude='package.json' --exclude='package-lock.json' \
            --exclude='vite.config.js' --exclude='README.md' \
            --exclude='.windsurf' \
            ./ deploy/laravel_app/

          rsync -a public/ deploy/public_html/

          cat > deploy/public_html/index.php << 'EOF'
          <?php

          use Illuminate\Foundation\Application;
          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          if (file_exists($maintenance = __DIR__.'/../laravel_app/storage/framework/maintenance.php')) {
              require $maintenance;
          }

          require __DIR__.'/../laravel_app/vendor/autoload.php';

          /** @var Application $app */
          $app = require_once __DIR__.'/../laravel_app/bootstrap/app.php';

          $app->handleRequest(Request::capture());
          EOF

          cat > deploy/laravel_app/.env << 'EOF'
          APP_NAME=Laravel
          APP_ENV=production
          APP_KEY=
          APP_DEBUG=false
          APP_URL=https://136.altekbilisim.com

          APP_LOCALE=tr
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US

          APP_MAINTENANCE_DRIVER=file

          BCRYPT_ROUNDS=12

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=alt300iliscomtr_136
          DB_USERNAME=alt300iliscomtr_kaanorhan
          DB_PASSWORD=136kaanorhan

          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync

          CACHE_STORE=file

          MAIL_MAILER=log
          EOF

          cd deploy/laravel_app
          php artisan key:generate --force
          cd ../..

          chmod -R 775 deploy/laravel_app/storage
          chmod -R 775 deploy/laravel_app/bootstrap/cache

      - name: Deploy public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/public_html/
          server-dir: public_html/
          timeout: 300000
          protocol: ftp
          security: loose
          log-level: standard

      - name: Deploy laravel_app
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/laravel_app/
          server-dir: laravel_app/
          timeout: 300000
          protocol: ftp
          security: loose
          log-level: standard

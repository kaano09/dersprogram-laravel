name: FTP Deploy

on:
  push:
    branches:
      - main # Hangi dalda (branch) çalışmasını istiyorsanız onu yazın (örn: master)

jobs:
  deploy:
    name: 🎉 Deploy to FTP
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' # Projenizin PHP sürümüne göre güncelleyin

    - name: 📦 Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🏗️ Build frontend assets (Vite)
      run: |
        npm install
        npm run build

    - name: 📂 Sync files to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Sunucu portu farklıysa port ayarını da ekleyebilirsiniz:
        # port: 21 
        # FTP kök dizinini belirtmek isterseniz:
        # server-dir: /public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          .env
          .env.example
          phpunit.xml
          README.md
          **/*.log
